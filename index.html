<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life With Júlia ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#111;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
}

#startScreen{

    position:absolute;
    width:100%;
    height:100%;

    background:linear-gradient(180deg,#ff5fa2,#ffb6d9);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:100;

    color:white;
}

#startScreen h1{

    font-size:90px;

    text-shadow:0 0 25px hotpink;
}

#startScreen p{

    margin-top:20px;
    font-size:30px;
}

#playBtn{

    margin-top:40px;

    border:none;

    padding:20px 60px;

    border-radius:25px;

    background:white;

    color:#ff1493;

    font-size:32px;

    cursor:pointer;

    box-shadow:0 0 25px white;
}

#dialogue{

    position:absolute;

    bottom:30px;
    left:50%;

    transform:translateX(-50%);

    width:900px;

    background:rgba(255,255,255,0.96);

    border-radius:30px;

    padding:25px;

    display:none;

    z-index:50;

    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

#dialogueText{

    font-size:32px;

    color:#ff1493;

    text-align:center;
}

#loveBar{

    position:absolute;

    top:20px;
    left:20px;

    width:350px;
    height:35px;

    background:rgba(255,255,255,0.3);

    border-radius:20px;

    overflow:hidden;

    border:2px solid white;

    z-index:10;
}

#loveFill{

    width:0%;
    height:100%;

    background:linear-gradient(90deg,#ff1493,#ff7eb3);

    transition:0.3s;
}

#loveText{

    position:absolute;

    top:65px;
    left:20px;

    color:white;

    font-size:28px;

    text-shadow:0 0 10px black;

    z-index:10;
}

#controls{

    position:absolute;

    top:20px;
    right:20px;

    color:white;

    font-size:24px;

    text-align:right;

    text-shadow:0 0 10px black;

    z-index:10;
}

</style>
</head>
<body>

<div id="startScreen">

    <h1>Life With Júlia ❤️</h1>

    <p>Entre no nosso mundinho</p>

    <button id="playBtn">COMEÇAR</button>

</div>

<div id="loveBar">
    <div id="loveFill"></div>
</div>

<div id="loveText">Amor ❤️ 0%</div>

<div id="controls">
    ← → ↑ ↓ para andar<br>
    SPACE para interagir
</div>

<div id="dialogue">
    <div id="dialogueText"></div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const music = new Audio("audio.mp3");
music.loop = true;
music.volume = 0.4;

const playerImg = new Image();
playerImg.src = "julia.png";

let gameStarted = false;

const keys = {};

const player = {

    x:500,
    y:350,

    width:170,
    height:240,

    speed:6
};

let love = 0;

const interactions = [

{
    x:250,
    y:240,
    width:170,
    height:130,
    emoji:"🛏️",
    text:"Nosso cantinho seria perfeito ❤️",
    done:false
},

{
    x:850,
    y:220,
    width:140,
    height:120,
    emoji:"📺",
    text:"Imagina maratonar séries juntinhos 🥰",
    done:false
},

{
    x:640,
    y:520,
    width:130,
    height:120,
    emoji:"🌹",
    text:"Você é a parte mais bonita da minha vida ❤️",
    done:false
},

{
    x:1120,
    y:470,
    width:150,
    height:140,
    emoji:"🎁",
    text:"Seu prêmio final vai ser especial 😘",
    done:false
},

{
    x:150,
    y:520,
    width:120,
    height:120,
    emoji:"🎵",
    text:"Toda música me lembra você ❤️",
    done:false
}

];

function updateLove(){

    document.getElementById("loveFill").style.width = love + "%";

    document.getElementById("loveText").innerText =
    "Amor ❤️ " + love + "%";
}

window.addEventListener("keydown", e=>{

    keys[e.key] = true;

    if(e.code === "Space"){
        interact();
    }
});

window.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

function movePlayer(){

    if(keys["ArrowLeft"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"]){
        player.x += player.speed;
    }

    if(keys["ArrowUp"]){
        player.y -= player.speed;
    }

    if(keys["ArrowDown"]){
        player.y += player.speed;
    }

    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width-player.width)
        player.x = canvas.width-player.width;

    if(player.y < 0) player.y = 0;
    if(player.y > canvas.height-player.height)
        player.y = canvas.height-player.height;
}

function interact(){

    interactions.forEach(item=>{

        const touching =
        player.x < item.x + item.width &&
        player.x + player.width > item.x &&
        player.y < item.y + item.height &&
        player.y + player.height > item.y;

        if(touching && !item.done){

            item.done = true;

            love += 20;

            if(love > 100) love = 100;

            updateLove();

            showDialogue(item.text);

            if(love >= 100){

                setTimeout(()=>{

                    showDialogue(
                    "Parabéns ❤️ Seu prêmio é um encontro comigo 😘"
                    );

                },2000);
            }
        }
    });
}

function showDialogue(text){

    const box = document.getElementById("dialogue");

    document.getElementById("dialogueText").innerText = text;

    box.style.display = "block";

    setTimeout(()=>{
        box.style.display = "none";
    },3500);
}

function drawBackground(){

    const gradient = ctx.createLinearGradient(0,0,0,canvas.height);

    gradient.addColorStop(0,"#ff7eb3");
    gradient.addColorStop(1,"#ffd6e8");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // chão
    ctx.fillStyle = "#f7b2d9";
    ctx.fillRect(0,canvas.height-180,canvas.width,180);

    // luzes
    for(let i=0;i<40;i++){

        ctx.fillStyle = "rgba(255,255,255,0.12)";

        ctx.beginPath();
        ctx.arc(
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            Math.random()*5,
            0,
            Math.PI*2
        );

        ctx.fill();
    }
}

function drawRoom(){

    // cama
    ctx.fillStyle = "#ff5fa2";
    ctx.fillRect(250,240,170,130);

    ctx.fillStyle = "white";
    ctx.fillRect(270,260,70,40);

    // tv
    ctx.fillStyle = "#222";
    ctx.fillRect(850,220,140,120);

    // flor
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(690,530,20,80);

    ctx.fillStyle = "#ff1493";

    ctx.beginPath();
    ctx.arc(700,510,30,0,Math.PI*2);
    ctx.fill();

    // presente
    ctx.fillStyle = "#ff1744";
    ctx.fillRect(1120,470,150,140);

    ctx.fillStyle = "gold";
    ctx.fillRect(1185,470,20,140);
    ctx.fillRect(1120,530,150,20);

    // música
    ctx.fillStyle = "white";
    ctx.font = "90px Arial";
    ctx.fillText("🎵",150,600);
}

function drawInteractions(){

    interactions.forEach(item=>{

        if(!item.done){

            ctx.font = "60px Arial";

            ctx.fillText(
                item.emoji,
                item.x + 40,
                item.y - 20
            );

            // brilho
            ctx.strokeStyle = "rgba(255,255,255,0.35)";
            ctx.lineWidth = 4;

            ctx.strokeRect(
                item.x,
                item.y,
                item.width,
                item.height
            );
        }
    });
}

function drawPlayer(){

    // sombra
    ctx.fillStyle = "rgba(0,0,0,0.25)";

    ctx.beginPath();
    ctx.ellipse(
        player.x + 85,
        player.y + 250,
        55,
        18,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    // brilho
    ctx.shadowColor = "hotpink";
    ctx.shadowBlur = 35;

    ctx.drawImage(
        playerImg,
        player.x,
        player.y,
        player.width,
        player.height
    );

    ctx.shadowBlur = 0;

    // balão
    ctx.fillStyle = "white";

    ctx.beginPath();
    ctx.roundRect(
        player.x - 40,
        player.y - 70,
        250,
        55,
        20
    );

    ctx.fill();

    ctx.fillStyle = "#ff1493";
    ctx.font = "22px Arial";

    ctx.fillText(
        "❤️ Eu te amo ❤️",
        player.x - 15,
        player.y - 35
    );
}

function loop(){

    if(gameStarted){
        movePlayer();
    }

    drawBackground();

    drawRoom();

    drawInteractions();

    drawPlayer();

    requestAnimationFrame(loop);
}

playerImg.onload = ()=>{
    loop();
};

playerImg.onerror = ()=>{
    loop();
};


document.getElementById("playBtn").onclick = ()=>{

    document.getElementById("startScreen").style.display = "none";

    gameStarted = true;

    music.play().catch(()=>{});
};

</script>
</body>
</html>
