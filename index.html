<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Love Block Blast ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{ margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }

:root{
  --pink:#ff4d8d;
  --pink2:#ff85b3;
  --purple:#9b59f5;
  --blue:#4cc9f0;
  --yellow:#ffd60a;
}

body{
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  background:#1a0533;
  touch-action:none;
  user-select:none;
}

/* CANVAS FIX */
#bgCanvas,#game{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  display:block;
}

.aurora{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(155,89,245,.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(255,77,141,.28) 0%, transparent 55%),
    radial-gradient(ellipse 70% 40% at 50% 90%, rgba(76,201,240,.2) 0%, transparent 60%);
  animation:aurora 8s ease-in-out infinite alternate;
}
@keyframes aurora{
  0%  { transform:scale(1) rotate(0deg);opacity:.8; }
  50% { transform:scale(1.08) rotate(1deg);opacity:1; }
  100%{ transform:scale(1.04) rotate(-1deg);opacity:.85; }
}

/* resto do seu CSS fica IGUAL */
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>
<div class="aurora"></div>
<canvas id="game"></canvas>

<script>

// ─── CANVAS ───
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const bgCanvas = document.getElementById("bgCanvas");
const bgCtx = bgCanvas.getContext("2d");

let GRID = 8;
let CELL = 40;
let boardX = 0;
let boardY = 158;

// ✅ FIX PRINCIPAL (DPI + toque correto)
function resize(){
  const dpr = window.devicePixelRatio || 1;

  canvas.width = bgCanvas.width = innerWidth * dpr;
  canvas.height = bgCanvas.height = innerHeight * dpr;

  canvas.style.width = bgCanvas.style.width = innerWidth + "px";
  canvas.style.height = bgCanvas.style.height = innerHeight + "px";

  ctx.setTransform(dpr,0,0,dpr,0,0);
  bgCtx.setTransform(dpr,0,0,dpr,0,0);

  CELL = Math.min(innerWidth * 0.10, 46);
  boardX = (innerWidth - GRID * CELL) / 2;
}

addEventListener("resize", resize);
resize();

// ─── STATE ───
let board = [];
let pieces = [];
let dragging = null;
let gameRunning = true;

// ─── BOARD ───
function resetBoard(){
  board = [];
  for(let y=0;y<GRID;y++){
    board[y] = [];
    for(let x=0;x<GRID;x++){
      board[y][x] = null;
    }
  }
}
resetBoard();

// ─── PIECES ───
function makePiece(){
  return {
    shape:[[1,1],[1,1]],
    color:"#ff4d8d",
    used:false
  };
}

pieces = [makePiece(),makePiece(),makePiece()];

// ─── FIX TOQUE/CURSOR ───
function getPos(e){
  const rect = canvas.getBoundingClientRect();

  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

// ─── DRAG ───
function startDrag(e){
  if(!gameRunning) return;

  const p = getPos(e);

  pieces.forEach((piece,i)=>{
    if(piece.used) return;

    const px = 100 + i*120;
    const py = innerHeight - 110; // ✅ FIX IMPORTANTE

    const w = piece.shape[0].length * 20;
    const h = piece.shape.length * 20;

    if(p.x>px && p.x<px+w && p.y>py && p.y<py+h){
      dragging = { piece, i, x:p.x, y:p.y };
    }
  });
}

function moveDrag(e){
  if(!dragging) return;
  const p = getPos(e);

  dragging.x = p.x;
  dragging.y = p.y;
}

function endDrag(){
  if(!dragging) return;

  const gx = Math.round((dragging.x - boardX)/CELL);
  const gy = Math.round((dragging.y - boardY)/CELL);

  if(board[gy] && board[gy][gx] === null){
    board[gy][gx] = dragging.piece.color;
  }

  pieces[dragging.i].used = true;
  dragging = null;
}

// ─── DRAW ───
function draw(){
  ctx.clearRect(0,0,innerWidth,innerHeight);

  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){
      ctx.strokeStyle="#fff2";
      ctx.strokeRect(boardX+x*CELL,boardY+y*CELL,CELL,CELL);

      if(board[y][x]){
        ctx.fillStyle=board[y][x];
        ctx.fillRect(boardX+x*CELL,boardY+y*CELL,CELL,CELL);
      }
    }
  }

  pieces.forEach((p,i)=>{
    if(p.used) return;

    const px = 100 + i*120;
    const py = innerHeight - 110;

    p.shape.forEach((row,y)=>{
      row.forEach((v,x)=>{
        if(v){
          ctx.fillStyle=p.color;
          ctx.fillRect(px+x*20,py+y*20,18,18);
        }
      });
    });
  });

  requestAnimationFrame(draw);
}
draw();

// ─── EVENTS ───
canvas.addEventListener("touchstart", startDrag, {passive:false});
canvas.addEventListener("touchmove", moveDrag, {passive:false});
canvas.addEventListener("touchend", endDrag);

canvas.addEventListener("mousedown", startDrag);
canvas.addEventListener("mousemove", moveDrag);
canvas.addEventListener("mouseup", endDrag);

</script>
</body>
</html>
