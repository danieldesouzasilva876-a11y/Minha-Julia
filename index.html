<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Júlia ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#6ec6ff;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
    margin:auto;
    background:linear-gradient(#6ec6ff,#dff6ff);
}

#loading{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:white;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}
</style>
</head>
<body>

<div id="loading">Carregando ❤️</div>

<canvas id="game" width="1280" height="720"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.8;

let cameraX = 0;

const keys = {};

const playerImage = new Image();
playerImage.src = "julia.png";

const bgMusic = new Audio("music.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

const collectSound = new Audio("collect.mp3");

const player = {
    x:100,
    y:400,
    width:100,
    height:130,
    velX:0,
    velY:0,
    speed:7,
    jumping:false
};

const worldWidth = 5000;

const platforms = [
    {x:0,y:600,w:800,h:120},
    {x:900,y:520,w:250,h:40},
    {x:1300,y:450,w:250,h:40},
    {x:1700,y:380,w:250,h:40},
    {x:2200,y:500,w:400,h:40},
    {x:2800,y:420,w:300,h:40},
    {x:3400,y:350,w:300,h:40},
    {x:4000,y:520,w:700,h:120},
];

const hearts = [
    {x:980,y:450,collected:false},
    {x:1380,y:380,collected:false},
    {x:1780,y:310,collected:false},
    {x:2350,y:430,collected:false},
    {x:2900,y:350,collected:false},
    {x:3500,y:280,collected:false},
];

const enemies = [
    {x:1500,y:560,w:70,h:70,dir:1},
    {x:2600,y:460,w:70,h:70,dir:-1},
    {x:3700,y:560,w:70,h:70,dir:1},
];

let score = 0;

const clouds = [];

for(let i=0;i<20;i++){
    clouds.push({
        x:Math.random()*5000,
        y:Math.random()*250,
        size:80 + Math.random()*100
    });
}

document.addEventListener("keydown", e=>{

    keys[e.key] = true;

    if(e.key === "ArrowUp" && !player.jumping){
        player.velY = -18;
        player.jumping = true;
    }

    if(bgMusic.paused){
        bgMusic.play();
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

function update(){

    // Movimento
    player.velX = 0;

    if(keys["ArrowRight"]){
        player.velX = player.speed;
    }

    if(keys["ArrowLeft"]){
        player.velX = -player.speed;
    }

    player.x += player.velX;

    // Gravidade
    player.velY += gravity;
    player.y += player.velY;

    // Plataformas
    let grounded = false;

    platforms.forEach(platform=>{

        if(
            player.x + player.width > platform.x &&
            player.x < platform.x + platform.w &&
            player.y + player.height > platform.y &&
            player.y + player.height < platform.y + 30 &&
            player.velY >= 0
        ){
            player.y = platform.y - player.height;
            player.velY = 0;
            grounded = true;
        }
    });

    player.jumping = !grounded;

    // Coletar corações
    hearts.forEach(heart=>{

        if(!heart.collected){

            if(
                player.x < heart.x + 40 &&
                player.x + player.width > heart.x &&
                player.y < heart.y + 40 &&
                player.y + player.height > heart.y
            ){
                heart.collected = true;
                score++;

                collectSound.currentTime = 0;
                collectSound.play();
            }
        }
    });

    // Inimigos
    enemies.forEach(enemy=>{

        enemy.x += enemy.dir * 2;

        if(enemy.x < enemy.startX - 100 || enemy.x > enemy.startX + 100){
            enemy.dir *= -1;
        }

        if(
            player.x < enemy.x + enemy.w &&
            player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.h &&
            player.y + player.height > enemy.y
        ){
            player.x = 100;
            player.y = 400;
        }
    });

    // câmera
    cameraX = player.x - 300;

    if(cameraX < 0){
        cameraX = 0;
    }
}

function drawBackground(){

    // Céu
    ctx.fillStyle = "#6ec6ff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Sol
    ctx.beginPath();
    ctx.arc(1100,100,60,0,Math.PI*2);
    ctx.fillStyle = "yellow";
    ctx.fill();

    // Nuvens
    clouds.forEach(cloud=>{

        ctx.fillStyle = "white";

        ctx.beginPath();
        ctx.arc(cloud.x-cameraX,cloud.y,40,0,Math.PI*2);
        ctx.arc(cloud.x+40-cameraX,cloud.y+10,50,0,Math.PI*2);
        ctx.arc(cloud.x+90-cameraX,cloud.y,40,0,Math.PI*2);
        ctx.fill();
    });
}

function drawPlatforms(){

    platforms.forEach(platform=>{

        ctx.fillStyle = "#5b3a29";
        ctx.fillRect(
            platform.x-cameraX,
            platform.y,
            platform.w,
            platform.h
        );

        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(
            platform.x-cameraX,
            platform.y,
            platform.w,
            15
        );
    });
}

function drawHearts(){

    hearts.forEach(heart=>{

        if(!heart.collected){

            ctx.font = "40px Arial";
            ctx.fillText(
                "❤️",
                heart.x-cameraX,
                heart.y
            );
        }
    });
}

function drawEnemies(){

    enemies.forEach(enemy=>{

        ctx.fillStyle = "red";

        ctx.beginPath();
        ctx.arc(
            enemy.x-cameraX+35,
            enemy.y+35,
            35,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.fillStyle = "white";

        ctx.fillRect(enemy.x-cameraX+15,enemy.y+20,10,10);
        ctx.fillRect(enemy.x-cameraX+45,enemy.y+20,10,10);
    });
}

function drawPlayer(){

    ctx.drawImage(
        playerImage,
        player.x-cameraX,
        player.y,
        player.width,
        player.height
    );
}

function drawUI(){

    ctx.fillStyle = "white";
    ctx.font = "35px Arial";
    ctx.fillText("❤️ " + score + " / 6",40,50);

    ctx.fillText("Adventure Júlia",40,100);

    // Final
    if(score >= 6){

        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "pink";
        ctx.font = "70px Arial";
        ctx.fillText("Você zerou meu coração ❤️",170,250);

        ctx.font = "40px Arial";
        ctx.fillText("Obrigado por existir na minha vida",250,340);

        ctx.fillText("Eu te amo Júlia ❤️",390,420);
    }
}

function draw(){

    drawBackground();

    drawPlatforms();

    drawHearts();

    drawEnemies();

    drawPlayer();

    drawUI();
}

function gameLoop(){

    update();

    draw();

    requestAnimationFrame(gameLoop);
}

playerImage.onload = ()=>{

    document.getElementById("loading").style.display = "none";

    enemies.forEach(enemy=>{
        enemy.startX = enemy.x;
    });

    gameLoop();
};

</script>

</body>
</html>
