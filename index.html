<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Blast ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    overflow:hidden;

    background:linear-gradient(180deg,#ff7eb3,#ffd6e8);

    font-family:Arial;

    display:flex;

    justify-content:center;
    align-items:center;

    height:100vh;
}

#gameContainer{

    position:relative;

    width:520px;
}

canvas{

    background:white;

    border-radius:25px;

    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

#topUI{

    position:absolute;

    top:-170px;

    width:100%;

    display:flex;
    flex-direction:column;
    align-items:center;
}

#julia{

    width:140px;
    height:140px;

    object-fit:cover;

    border-radius:50%;

    border:5px solid white;

    box-shadow:0 0 25px hotpink;
}

#speech{

    margin-top:15px;

    background:white;

    padding:15px 25px;

    border-radius:25px;

    font-size:24px;

    color:#ff1493;

    box-shadow:0 0 15px rgba(0,0,0,0.2);

    min-width:350px;

    text-align:center;
}

#score{

    position:absolute;

    top:15px;
    left:20px;

    color:#ff1493;

    font-size:28px;

    font-weight:bold;
}

</style>
</head>
<body>

<div id="gameContainer">

    <div id="topUI">

        <img src="julia.png" id="julia">

        <div id="speech">
            Vamos jogar ❤️
        </div>

    </div>

    <div id="score">
        ❤️ 0
    </div>

    <canvas id="game" width="520" height="700"></canvas>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRID = 8;

const SIZE = 60;

let score = 0;

const colors = [

    "#ff5fa2",
    "#ff8fab",
    "#ffd166",
    "#c77dff",
    "#7bdff2"
];

const emojis = [

    "❤️",
    "🥰",
    "💖",
    "😘",
    "💕"
];

const phrases = [

    "Te amo ❤️",
    "Minha baixinha ❤️",
    "Morena do Daniel ❤️",
    "Você é perfeita ❤️",
    "Meu amor ❤️",
    "Linda demais ❤️",
    "Você me faz feliz ❤️",
    "Meu coração é seu ❤️",
    "Você é especial ❤️",
    "Quero você pra sempre ❤️"
];

let board = [];

for(let y=0;y<GRID;y++){

    board[y] = [];

    for(let x=0;x<GRID;x++){

        board[y][x] = randomBlock();
    }
}

function randomBlock(){

    return {

        color:colors[
            Math.floor(Math.random()*colors.length)
        ],

        emoji:emojis[
            Math.floor(Math.random()*emojis.length)
        ]
    };
}

function drawBoard(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let y=0;y<GRID;y++){

        for(let x=0;x<GRID;x++){

            const block = board[y][x];

            if(block){

                const px = x*SIZE + 20;
                const py = y*SIZE + 120;

                // sombra

                ctx.fillStyle = "rgba(0,0,0,0.15)";

                ctx.fillRect(
                    px+5,
                    py+5,
                    SIZE-8,
                    SIZE-8
                );

                // bloco

                ctx.fillStyle = block.color;

                roundRect(
                    px,
                    py,
                    SIZE-8,
                    SIZE-8,
                    18,
                    true
                );

                // brilho

                ctx.fillStyle = "rgba(255,255,255,0.2)";

                roundRect(
                    px+5,
                    py+5,
                    SIZE-20,
                    15,
                    10,
                    true
                );

                // emoji

                ctx.font = "28px Arial";

                ctx.fillStyle = "white";

                ctx.fillText(
                    block.emoji,
                    px+13,
                    py+38
                );
            }
        }
    }
}

function roundRect(x,y,w,h,r,fill){

    ctx.beginPath();

    ctx.moveTo(x+r,y);

    ctx.lineTo(x+w-r,y);

    ctx.quadraticCurveTo(x+w,y,x+w,y+r);

    ctx.lineTo(x+w,y+h-r);

    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);

    ctx.lineTo(x+r,y+h);

    ctx.quadraticCurveTo(x,y+h,x,y+h-r);

    ctx.lineTo(x,y+r);

    ctx.quadraticCurveTo(x,y,x+r,y);

    ctx.closePath();

    if(fill){

        ctx.fill();
    }
}

function checkMatches(){

    let matched = [];

    // horizontal

    for(let y=0;y<GRID;y++){

        for(let x=0;x<GRID-2;x++){

            const a = board[y][x];
            const b = board[y][x+1];
            const c = board[y][x+2];

            if(
                a && b && c &&
                a.color === b.color &&
                b.color === c.color
            ){

                matched.push([x,y]);
                matched.push([x+1,y]);
                matched.push([x+2,y]);
            }
        }
    }

    // vertical

    for(let x=0;x<GRID;x++){

        for(let y=0;y<GRID-2;y++){

            const a = board[y][x];
            const b = board[y+1][x];
            const c = board[y+2][x];

            if(
                a && b && c &&
                a.color === b.color &&
                b.color === c.color
            ){

                matched.push([x,y]);
                matched.push([x,y+1]);
                matched.push([x,y+2]);
            }
        }
    }

    if(matched.length > 0){

        matched.forEach(m=>{

            board[m[1]][m[0]] = null;
        });

        dropBlocks();

        score += matched.length;

        document.getElementById("score").innerText =
        "❤️ " + score;

        showPhrase();
    }
}

function dropBlocks(){

    for(let x=0;x<GRID;x++){

        for(let y=GRID-1;y>=0;y--){

            if(board[y][x] === null){

                for(let yy=y-1;yy>=0;yy--){

                    if(board[yy][x]){

                        board[y][x] = board[yy][x];

                        board[yy][x] = null;

                        break;
                    }
                }
            }
        }

        for(let y=0;y<GRID;y++){

            if(board[y][x] === null){

                board[y][x] = randomBlock();
            }
        }
    }
}

function showPhrase(){

    const speech =
    document.getElementById("speech");

    speech.innerText = phrases[
        Math.floor(Math.random()*phrases.length)
    ];
}

canvas.addEventListener("click", e=>{

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const x = Math.floor((mx-20)/SIZE);
    const y = Math.floor((my-120)/SIZE);

    if(
        x >= 0 &&
        x < GRID &&
        y >= 0 &&
        y < GRID
    ){

        if(board[y][x]){

            const color = board[y][x].color;

            removeConnected(x,y,color);

            dropBlocks();

            checkMatches();
        }
    }
});

function removeConnected(x,y,color){

    if(
        x < 0 ||
        y < 0 ||
        x >= GRID ||
        y >= GRID
    ) return;

    const block = board[y][x];

    if(!block) return;

    if(block.color !== color) return;

    board[y][x] = null;

    score++;

    removeConnected(x+1,y,color);
    removeConnected(x-1,y,color);
    removeConnected(x,y+1,color);
    removeConnected(x,y-1,color);
}

function gameLoop(){

    drawBoard();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>
</body>
</html>
