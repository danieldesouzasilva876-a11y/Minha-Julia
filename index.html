<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Júlia ❤️</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:#87CEEB;
}
canvas{
  display:block;
  margin:auto;
  border:2px solid black;
}
</style>
</head>
<body>

<canvas id="game" width="1000" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
  x:100,
  y:330,
  w:80,
  h:100,
  vx:0,
  vy:0,
  onGround:true
};

const gravity = 0.7;
const speed = 6;

const keys = {};

const img = new Image();
img.src = "julia.png";

const hearts = [
  {x:350,y:340},
  {x:550,y:260},
  {x:750,y:340}
];

let score = 0;

document.addEventListener("keydown", e=>{
  keys[e.key] = true;

  if(e.key === "ArrowUp" && player.onGround){
    player.vy = -15;
    player.onGround = false;
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key] = false;
});

function update(){

  if(keys["ArrowRight"]){
    player.x += speed;
  }

  if(keys["ArrowLeft"]){
    player.x -= speed;
  }

  player.vy += gravity;
  player.y += player.vy;

  if(player.y >= 330){
    player.y = 330;
    player.vy = 0;
    player.onGround = true;
  }

  hearts.forEach((heart,index)=>{
    if(
      player.x < heart.x + 30 &&
      player.x + player.w > heart.x &&
      player.y < heart.y + 30 &&
      player.y + player.h > heart.y
    ){
      hearts.splice(index,1);
      score++;
    }
  });
}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // céu
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0,0,1000,500);

  // chão
  ctx.fillStyle = "green";
  ctx.fillRect(0,430,1000,70);

  // personagem
  ctx.drawImage(
    img,
    player.x,
    player.y,
    player.w,
    player.h
  );

  // corações
  hearts.forEach(h=>{
    ctx.font = "30px Arial";
    ctx.fillText("❤️", h.x, h.y);
  });

  // pontos
  ctx.fillStyle = "black";
  ctx.font = "24px Arial";
  ctx.fillText("Corações: " + score, 20, 40);

  // final
  if(score === 3){
    ctx.fillStyle = "pink";
    ctx.font = "40px Arial";
    ctx.fillText("Você conquistou meu coração ❤️", 180, 180);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
