<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Júlia Runner Deluxe ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
    margin:auto;
    background:#111;
}

#menu{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.75);
    z-index:10;
    color:white;
}

#menu h1{
    font-size:90px;
    color:pink;
    text-shadow:0 0 25px hotpink;
}

#menu p{
    margin-top:15px;
    font-size:25px;
}

#playBtn{
    margin-top:40px;
    padding:18px 60px;
    border:none;
    border-radius:20px;
    background:hotpink;
    color:white;
    font-size:30px;
    cursor:pointer;
    box-shadow:0 0 20px hotpink;
}
</style>
</head>
<body>

<div id="menu">
    <h1>JÚLIA RUNNER ❤️</h1>
    <p>Desvie dos obstáculos e sobreviva</p>
    <button id="playBtn">JOGAR</button>
</div>

<canvas id="game" width="1280" height="720"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const music = new Audio("audio.mp3");
music.loop = true;
music.volume = 0.5;

const playerImg = new Image();
playerImg.src = "julia.png";

const lanes = [360, 580, 800];

let currentLane = 1;

const player = {
    x: lanes[currentLane],
    y: 470,
    width: 140,
    height: 180,
    velY: 0,
    jumping:false,
    rotation:0
};

const gravity = 0.9;

let obstacles = [];
let particles = [];
let hearts = [];

let score = 0;
let bestScore = localStorage.getItem("bestScore") || 0;

let gameStarted = false;
let gameOver = false;

let roadOffset = 0;
let speed = 14;

function createObstacle(){

    const lane = Math.floor(Math.random()*3);

    obstacles.push({
        x: lanes[lane],
        y: -150,
        width: 120,
        height: 120,
        pulse:0
    });
}

setInterval(()=>{

    if(gameStarted && !gameOver){
        createObstacle();
    }

},900);


function createParticles(x,y){

    for(let i=0;i<10;i++){

        particles.push({
            x:x,
            y:y,
            size:Math.random()*6+2,
            velX:(Math.random()-0.5)*6,
            velY:(Math.random()-0.5)*6,
            alpha:1
        });
    }
}


function createFloatingHearts(){

    hearts.push({
        x:Math.random()*1280,
        y:760,
        speed:2+Math.random()*2,
        size:20+Math.random()*30
    });
}

setInterval(createFloatingHearts,300);


window.addEventListener("keydown", e=>{

    if(e.key === "ArrowLeft"){
        if(currentLane > 0){
            currentLane--;
        }
    }

    if(e.key === "ArrowRight"){
        if(currentLane < 2){
            currentLane++;
        }
    }

    if(e.key === "ArrowUp"){

        if(!player.jumping){
            player.velY = -20;
            player.jumping = true;
        }
    }
});


function update(){

    roadOffset += speed;

    speed += 0.002;

    player.x += (lanes[currentLane] - player.x) * 0.18;

    player.velY += gravity;
    player.y += player.velY;

    if(player.y >= 470){
        player.y = 470;
        player.velY = 0;
        player.jumping = false;
    }

    obstacles.forEach((obs,index)=>{

        obs.y += speed;
        obs.pulse += 0.1;

        if(
            player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y
        ){
            gameOver = true;

            createParticles(player.x+70, player.y+80);

            if(score > bestScore){
                localStorage.setItem("bestScore", score);
            }
        }

        if(obs.y > 800){
            obstacles.splice(index,1);
            score++;
        }
    });

    particles.forEach((p,index)=>{

        p.x += p.velX;
        p.y += p.velY;
        p.alpha -= 0.02;

        if(p.alpha <= 0){
            particles.splice(index,1);
        }
    });

    hearts.forEach((h,index)=>{

        h.y -= h.speed;

        if(h.y < -50){
            hearts.splice(index,1);
        }
    });
}


function drawBackground(){

    const gradient = ctx.createLinearGradient(0,0,0,720);

    gradient.addColorStop(0,"#ff5fa2");
    gradient.addColorStop(1,"#ffd6e8");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,1280,720);

    hearts.forEach(h=>{

        ctx.font = h.size + "px Arial";
        ctx.globalAlpha = 0.3;
        ctx.fillText("❤️", h.x, h.y);
        ctx.globalAlpha = 1;
    });
}


function drawRoad(){

    ctx.fillStyle = "#2c2c2c";
    ctx.fillRect(240,0,800,720);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 12;

    for(let i=-720;i<720;i+=80){

        ctx.beginPath();
        ctx.moveTo(510, i + (roadOffset % 80));
        ctx.lineTo(510, i+40 + (roadOffset % 80));
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(770, i + (roadOffset % 80));
        ctx.lineTo(770, i+40 + (roadOffset % 80));
        ctx.stroke();
    }
}


function drawPlayer(){

    ctx.save();

    ctx.shadowColor = "hotpink";
    ctx.shadowBlur = 30;

    ctx.drawImage(
        playerImg,
        player.x,
        player.y,
        player.width,
        player.height
    );

    ctx.restore();
}


function drawObstacles(){

    obstacles.forEach(obs=>{

        ctx.save();

        ctx.shadowColor = "red";
        ctx.shadowBlur = 25;

        const sizePulse = Math.sin(obs.pulse) * 5;

        ctx.fillStyle = "#ff1744";

        ctx.fillRect(
            obs.x-sizePulse/2,
            obs.y-sizePulse/2,
            obs.width+sizePulse,
            obs.height+sizePulse
        );

        ctx.fillStyle = "white";
        ctx.font = "60px Arial";
        ctx.fillText("X", obs.x+35, obs.y+78);

        ctx.restore();
    });
}


function drawParticles(){

    particles.forEach(p=>{

        ctx.globalAlpha = p.alpha;

        ctx.fillStyle = "white";

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();

        ctx.globalAlpha = 1;
    });
}


function drawUI(){

    ctx.fillStyle = "white";
    ctx.font = "42px Arial";

    ctx.fillText("Pontos: " + score, 40, 60);

    ctx.fillText("Recorde: " + bestScore, 40, 110);

    if(gameOver){

        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0,0,1280,720);

        ctx.fillStyle = "hotpink";
        ctx.font = "100px Arial";
        ctx.fillText("GAME OVER", 260, 240);

        ctx.font = "50px Arial";
        ctx.fillText("Pontuação: " + score, 430, 350);

        ctx.fillText("Recarregue para jogar novamente", 220, 450);
    }
}


function draw(){

    drawBackground();

    drawRoad();

    drawObstacles();

    drawPlayer();

    drawParticles();

    drawUI();
}


function gameLoop(){

    if(gameStarted && !gameOver){
        update();
    }

    draw();

    requestAnimationFrame(gameLoop);
}


document.getElementById("playBtn").onclick = ()=>{

    document.getElementById("menu").style.display = "none";

    gameStarted = true;

    music.play();
};


playerImg.onload = ()=>{
    gameLoop();
}

</script>
</body>
</html>
