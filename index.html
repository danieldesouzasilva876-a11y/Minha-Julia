<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida da Professora 📚</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#87CEEB;
    font-family:Arial;
}

canvas{
    display:block;
}

#ui{

    position:absolute;

    top:20px;
    left:20px;

    color:white;

    z-index:10;

    text-shadow:0 0 10px black;
}

#score{
    font-size:35px;
}

#start{

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.7);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    color:white;

    z-index:100;
}

#start h1{

    font-size:80px;

    color:#ffe066;

    text-shadow:0 0 20px orange;
}

#start button{

    margin-top:30px;

    border:none;

    padding:18px 50px;

    border-radius:20px;

    background:#ff9800;

    color:white;

    font-size:28px;

    cursor:pointer;

    box-shadow:0 0 20px orange;
}

#gameOver{

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.7);

    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    color:white;

    z-index:200;
}

#gameOver h1{

    font-size:70px;

    color:red;
}

</style>
</head>
<body>

<div id="start">

    <h1>Corrida da Professora 📚</h1>

    <p>Desvie dos obstáculos e colete estrelas!</p>

    <button id="playBtn">JOGAR</button>

</div>

<div id="ui">

    <div id="score">⭐ 0</div>

</div>

<div id="gameOver">

    <h1>Fim de Jogo 😅</h1>

    <p id="finalScore"></p>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const music = new Audio("audio.mp3");
music.loop = true;
music.volume = 0.4;

const playerImg = new Image();
playerImg.src = "julia.png";

let gameStarted = false;
let gameEnded = false;

let score = 0;

const player = {

    x:120,
    y:canvas.height-260,

    width:140,
    height:190,

    velY:0,

    jumping:false
};

const gravity = 0.8;

const obstacles = [];
const stars = [];

function createObstacle(){

    obstacles.push({

        x:canvas.width + 100,
        y:canvas.height - 120,

        width:70,
        height:70,

        speed:8
    });
}

function createStar(){

    stars.push({

        x:canvas.width + 100,
        y:250 + Math.random()*250,

        size:45,

        speed:8
    });
}

setInterval(()=>{

    if(gameStarted && !gameEnded){
        createObstacle();
    }

},1800);

setInterval(()=>{

    if(gameStarted && !gameEnded){
        createStar();
    }

},1200);

window.addEventListener("keydown", e=>{

    if(e.key === " " && !player.jumping){

        player.velY = -18;

        player.jumping = true;
    }
});

function update(){

    player.velY += gravity;

    player.y += player.velY;

    if(player.y >= canvas.height-260){

        player.y = canvas.height-260;

        player.velY = 0;

        player.jumping = false;
    }

    obstacles.forEach((obs,index)=>{

        obs.x -= obs.speed;

        if(obs.x + obs.width < 0){
            obstacles.splice(index,1);
        }

        if(
            player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y
        ){
            endGame();
        }
    });

    stars.forEach((star,index)=>{

        star.x -= star.speed;

        if(star.x + star.size < 0){
            stars.splice(index,1);
        }

        if(
            player.x < star.x + star.size &&
            player.x + player.width > star.x &&
            player.y < star.y + star.size &&
            player.y + player.height > star.y
        ){

            stars.splice(index,1);

            score++;

            document.getElementById("score").innerText =
            "⭐ " + score;
        }
    });
}

function drawBackground(){

    const gradient = ctx.createLinearGradient(
        0,0,0,canvas.height
    );

    gradient.addColorStop(0,"#87CEEB");
    gradient.addColorStop(1,"#dff6ff");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // chão

    ctx.fillStyle = "#7cb342";
    ctx.fillRect(0,canvas.height-70,canvas.width,70);

    // escola

    ctx.fillStyle = "#f4a261";

    ctx.fillRect(900,220,300,260);

    ctx.fillStyle = "white";

    for(let i=0;i<3;i++){

        ctx.fillRect(940+i*80,280,50,50);
        ctx.fillRect(940+i*80,360,50,50);
    }

    ctx.fillStyle = "#8d5524";
    ctx.fillRect(1030,390,50,90);
}

function drawPlayer(){

    ctx.fillStyle = "rgba(0,0,0,0.25)";

    ctx.beginPath();
    ctx.ellipse(
        player.x+70,
        player.y+190,
        50,
        15,
        0,
        0,
        Math.PI*2
    );
    ctx.fill();

    ctx.shadowColor = "gold";
    ctx.shadowBlur = 25;

    ctx.drawImage(
        playerImg,
        player.x,
        player.y,
        player.width,
        player.height
    );

    ctx.shadowBlur = 0;
}

function drawObstacles(){

    obstacles.forEach(obs=>{

        ctx.fillStyle = "#6d4c41";

        ctx.fillRect(
            obs.x,
            obs.y,
            obs.width,
            obs.height
        );

        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("📚",obs.x+10,obs.y+50);
    });
}

function drawStars(){

    stars.forEach(star=>{

        ctx.font = "45px Arial";

        ctx.fillText(
            "⭐",
            star.x,
            star.y
        );
    });
}

function endGame(){

    gameEnded = true;

    document.getElementById("finalScore").innerText =
    "Pontuação: " + score;

    document.getElementById("gameOver").style.display = "flex";
}

function draw(){

    drawBackground();

    drawStars();

    drawObstacles();

    drawPlayer();
}

function loop(){

    if(gameStarted && !gameEnded){
        update();
    }

    draw();

    requestAnimationFrame(loop);
}

playerImg.onload = ()=>{
    loop();
};

playerImg.onerror = ()=>{
    loop();
};


document.getElementById("playBtn").onclick = ()=>{

    document.getElementById("start").style.display = "none";

    gameStarted = true;

    music.play().catch(()=>{});
};

</script>
</body>
</html>
