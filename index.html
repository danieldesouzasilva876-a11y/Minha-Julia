<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Júlia ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#111;
    font-family:Arial;
}

canvas{
    display:block;
    background:linear-gradient(#87CEEB,#ffd6e8);
}

#startScreen{

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.7);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    color:white;

    z-index:100;
}

#startScreen h1{

    font-size:90px;

    color:pink;

    text-shadow:0 0 25px hotpink;
}

#startBtn{

    margin-top:35px;

    border:none;

    padding:20px 60px;

    font-size:30px;

    border-radius:25px;

    background:hotpink;

    color:white;

    cursor:pointer;

    box-shadow:0 0 25px hotpink;
}

#message{

    position:absolute;

    top:40px;
    left:50%;

    transform:translateX(-50%);

    background:white;

    padding:18px 35px;

    border-radius:25px;

    color:#ff1493;

    font-size:32px;

    display:none;

    z-index:20;

    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

#score{

    position:absolute;

    top:20px;
    left:20px;

    color:white;

    font-size:35px;

    z-index:10;

    text-shadow:0 0 10px black;
}

</style>
</head>
<body>

<div id="startScreen">

    <h1>SUPER JÚLIA ❤️</h1>

    <button id="startBtn">JOGAR</button>

</div>

<div id="message"></div>

<div id="score">❤️ 0 / 10</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const playerImg = new Image();
playerImg.src = "julia.png";

const gravity = 0.8;

let gameStarted = false;

const music = new Audio("audio.mp3");
music.loop = true;
music.volume = 0.4;

const player = {

    x:100,
    y:300,

    width:140,
    height:190,

    velX:0,
    velY:0,

    speed:7,

    jumping:false
};

const keys = {};

let cameraX = 0;

let collected = 0;

const platforms = [

    {x:0,y:650,w:1000,h:100},

    {x:1200,y:560,w:300,h:40},

    {x:1700,y:470,w:300,h:40},

    {x:2300,y:390,w:300,h:40},

    {x:2900,y:300,w:300,h:40},

    {x:3500,y:650,w:1200,h:100}
];

const heartMessages = [

"Te amo ❤️",

"Minha baixinha ❤️",

"Morena do Daniel ❤️",

"Meu lugar favorito é você ❤️",

"Você é minha gatinha ❤️",

"Meu coração é seu ❤️",

"Minha princesa ❤️",

"Você ilumina meus dias ❤️",

"Quero você pra sempre ❤️",

"Você é o amor da minha vida ❤️"

];

const hearts = [];

for(let i=0;i<10;i++){

    hearts.push({

        x:700 + i*380,

        y:200 + Math.sin(i)*120,

        collected:false,

        message:heartMessages[i]
    });
}

const particles = [];

document.addEventListener("keydown", e=>{

    keys[e.key] = true;

    if(e.key === "ArrowUp" && !player.jumping){

        player.velY = -18;

        player.jumping = true;
    }
});

document.addEventListener("keyup", e=>{

    keys[e.key] = false;
});

function createParticles(x,y){

    for(let i=0;i<15;i++){

        particles.push({

            x:x,
            y:y,

            size:Math.random()*6+2,

            velX:(Math.random()-0.5)*6,

            velY:(Math.random()-0.5)*6,

            alpha:1
        });
    }
}

function showMessage(text){

    const box = document.getElementById("message");

    box.innerText = text;

    box.style.display = "block";

    setTimeout(()=>{

        box.style.display = "none";

    },2500);
}

function update(){

    player.velX = 0;

    if(keys["ArrowRight"]){

        player.velX = player.speed;
    }

    if(keys["ArrowLeft"]){

        player.velX = -player.speed;
    }

    player.x += player.velX;

    player.velY += gravity;

    player.y += player.velY;

    let grounded = false;

    platforms.forEach(platform=>{

        if(

            player.x + player.width > platform.x &&
            player.x < platform.x + platform.w &&

            player.y + player.height > platform.y &&
            player.y + player.height < platform.y + 30 &&

            player.velY >= 0
        ){

            player.y = platform.y - player.height;

            player.velY = 0;

            grounded = true;
        }
    });

    player.jumping = !grounded;

    hearts.forEach(heart=>{

        if(!heart.collected){

            if(

                player.x < heart.x + 40 &&
                player.x + player.width > heart.x &&

                player.y < heart.y + 40 &&
                player.y + player.height > heart.y
            ){

                heart.collected = true;

                collected++;

                document.getElementById("score").innerText =
                "❤️ " + collected + " / 10";

                showMessage(heart.message);

                createParticles(heart.x,heart.y);
            }
        }
    });

    particles.forEach((p,index)=>{

        p.x += p.velX;

        p.y += p.velY;

        p.alpha -= 0.02;

        if(p.alpha <= 0){

            particles.splice(index,1);
        }
    });

    cameraX = player.x - 350;

    if(cameraX < 0){

        cameraX = 0;
    }
}

function drawBackground(){

    const gradient = ctx.createLinearGradient(
        0,0,0,canvas.height
    );

    gradient.addColorStop(0,"#87CEEB");
    gradient.addColorStop(1,"#ffd6e8");

    ctx.fillStyle = gradient;

    ctx.fillRect(0,0,canvas.width,canvas.height);

    // nuvens

    ctx.fillStyle = "rgba(255,255,255,0.6)";

    for(let i=0;i<12;i++){

        ctx.beginPath();

        ctx.arc(
            i*400 - cameraX*0.2,
            120 + Math.sin(i)*30,
            50,
            0,
            Math.PI*2
        );

        ctx.fill();
    }
}

function drawPlatforms(){

    platforms.forEach(platform=>{

        // terra

        ctx.fillStyle = "#7a5230";

        ctx.fillRect(

            platform.x-cameraX,
            platform.y,

            platform.w,
            platform.h
        );

        // grama

        ctx.fillStyle = "#2ecc71";

        ctx.fillRect(

            platform.x-cameraX,
            platform.y,

            platform.w,
            15
        );
    });
}

function drawHearts(){

    hearts.forEach(heart=>{

        if(!heart.collected){

            ctx.font = "50px Arial";

            ctx.fillText(

                "❤️",

                heart.x-cameraX,
                heart.y
            );
        }
    });
}

function drawParticles(){

    particles.forEach(p=>{

        ctx.globalAlpha = p.alpha;

        ctx.fillStyle = "white";

        ctx.beginPath();

        ctx.arc(
            p.x-cameraX,
            p.y,
            p.size,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.globalAlpha = 1;
    });
}

function drawPlayer(){

    // sombra

    ctx.fillStyle = "rgba(0,0,0,0.3)";

    ctx.beginPath();

    ctx.ellipse(

        player.x-cameraX+70,
        player.y+200,

        55,
        15,

        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    // brilho

    ctx.shadowColor = "hotpink";
    ctx.shadowBlur = 30;

    ctx.drawImage(

        playerImg,

        player.x-cameraX,
        player.y,

        player.width,
        player.height
    );

    ctx.shadowBlur = 0;
}

function drawFinal(){

    if(collected >= 10){

        ctx.fillStyle = "rgba(0,0,0,0.7)";

        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "pink";

        ctx.font = "75px Arial";

        ctx.fillText(

            "Você zerou meu coração ❤️",

            180,
            240
        );

        ctx.font = "40px Arial";

        ctx.fillText(

            "Obrigado por existir na minha vida ❤️",

            300,
            340
        );

        ctx.fillText(

            "Eu te amo MUITO ❤️",

            430,
            420
        );
    }
}

function draw(){

    drawBackground();

    drawPlatforms();

    drawHearts();

    drawParticles();

    drawPlayer();

    drawFinal();
}

function loop(){

    if(gameStarted){

        update();
    }

    draw();

    requestAnimationFrame(loop);
}

playerImg.onload = ()=>{

    loop();
};

playerImg.onerror = ()=>{

    loop();
};

document.getElementById("startBtn").onclick = ()=>{

    document.getElementById("startScreen").style.display = "none";

    gameStarted = true;

    music.play().catch(()=>{});
};

</script>
</body>
</html>
