<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz da Júlia ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#ff7eb3,#ffb6d9,#ffe0ec);
}

canvas{
    display:block;
}

#quizBox{

    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    width:700px;

    background:rgba(255,255,255,0.95);

    border-radius:30px;

    padding:25px;

    box-shadow:0 0 30px rgba(0,0,0,0.3);

    z-index:10;
}

#question{

    font-size:30px;
    margin-bottom:25px;
    color:#ff1493;
    text-align:center;
}

.answers{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

button{

    border:none;
    padding:18px;
    border-radius:20px;
    cursor:pointer;

    font-size:20px;

    background:#ff5fa2;
    color:white;

    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    background:#ff2e88;
}

#score{

    position:absolute;
    top:20px;
    left:20px;

    font-size:30px;
    color:white;
    text-shadow:0 0 10px black;
}

#finalScreen{

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.8);

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    color:white;

    z-index:100;
}

#finalScreen h1{

    font-size:80px;
    color:pink;
    text-shadow:0 0 20px hotpink;
}

#finalScreen p{

    margin-top:20px;
    font-size:35px;
}

</style>
</head>
<body>

<div id="score">❤️ 0 / 10</div>

<div id="quizBox">

    <div id="question"></div>

    <div class="answers">
        <button id="a1"></button>
        <button id="a2"></button>
        <button id="a3"></button>
        <button id="a4"></button>
    </div>

</div>

<div id="finalScreen">

    <h1>VOCÊ VENCEU ❤️</h1>

    <p>Seu prêmio é um encontro comigo 😘</p>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const playerImg = new Image();
playerImg.src = "julia.png";

let hearts = [];

for(let i=0;i<30;i++){

    hearts.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:20+Math.random()*30,
        speed:1+Math.random()*2
    });
}

const questions = [

{
q:"Onde nos conhecemos?",
a:["Instagram","Escola","Rua","Mercado"],
correct:0
},

{
q:"Quem se apaixonou primeiro?",
a:["Você","Eu","Os dois","Ninguém"],
correct:1
},

{
q:"Qual nossa música?",
a:["A","B","C","D"],
correct:1
},

{
q:"Quem manda mais mensagem?",
a:["Você","Eu","Os dois","Ninguém"],
correct:1
},

{
q:"Quem sente mais saudade?",
a:["Você","Eu","Os dois","Ninguém"],
correct:2
},

{
q:"Qual comida favorita?",
a:["Pizza","Hambúrguer","Açaí","Sushi"],
correct:1
},

{
q:"Quem é mais ciumento?",
a:["Você","Eu","Os dois","Ninguém"],
correct:1
},

{
q:"Qual nosso sonho?",
a:["Viajar","Morar juntos","Ter empresa","Tudo"],
correct:3
},

{
q:"Quem é mais fofo?",
a:["Você","Eu","Os dois","Ninguém"],
correct:2
},

{
q:"Você me ama?",
a:["Muito","Demais","Óbvio","Todas"],
correct:3
}

];

let current = 0;
let score = 0;

const questionEl = document.getElementById("question");

const buttons = [

document.getElementById("a1"),
document.getElementById("a2"),
document.getElementById("a3"),
document.getElementById("a4")

];

function loadQuestion(){

    const q = questions[current];

    questionEl.innerText = q.q;

    buttons.forEach((btn,index)=>{

        btn.innerText = q.a[index];

        btn.onclick = ()=>{

            if(index === q.correct){

                score++;

                document.getElementById("score").innerText =
                "❤️ " + score + " / 10";
            }

            current++;

            if(current >= questions.length){

                finishGame();

            }else{

                loadQuestion();
            }
        };
    });
}

function finishGame(){

    document.getElementById("quizBox").style.display = "none";

    if(score >= 10){

        document.getElementById("finalScreen").style.display = "flex";

    }else{

        questionEl.innerText = "Você acertou " + score + " ❤️";
    }
}

function drawBackground(){

    const gradient = ctx.createLinearGradient(0,0,0,canvas.height);

    gradient.addColorStop(0,"#ff7eb3");
    gradient.addColorStop(1,"#ffd6e8");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    hearts.forEach(h=>{

        ctx.globalAlpha = 0.4;

        ctx.font = h.size + "px Arial";

        ctx.fillText("❤️",h.x,h.y);

        h.y -= h.speed;

        if(h.y < -50){

            h.y = canvas.height + 50;
            h.x = Math.random()*canvas.width;
        }
    });

    ctx.globalAlpha = 1;
}

function drawCharacter(){

    const x = canvas.width/2 - 120;
    const y = canvas.height/2 - 200;

    // sombra
    ctx.fillStyle = "rgba(0,0,0,0.3)";

    ctx.beginPath();
    ctx.ellipse(
        canvas.width/2,
        y+320,
        80,
        20,
        0,
        0,
        Math.PI*2
    );
    ctx.fill();

    // brilho
    ctx.shadowColor = "hotpink";
    ctx.shadowBlur = 30;

    ctx.drawImage(
        playerImg,
        x,
        y,
        240,
        320
    );

    ctx.shadowBlur = 0;

    // bolha
    ctx.fillStyle = "white";

    ctx.beginPath();

    ctx.roundRect(
        canvas.width/2 - 250,
        y - 140,
        500,
        100,
        25
    );

    ctx.fill();

    ctx.fillStyle = "#ff1493";

    ctx.font = "28px Arial";

    ctx.textAlign = "center";

    ctx.fillText(
        questions[current]?.q || "Você venceu ❤️",
        canvas.width/2,
        y - 80
    );
}

function loop(){

    drawBackground();

    drawCharacter();

    requestAnimationFrame(loop);
}

playerImg.onload = ()=>{

    loop();

    loadQuestion();
};

</script>
</body>
</html>
